name: university-portal

services:
  # 1. База данных PostgreSQL
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      # Берем всё из .env файла
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  # 2. S3 (MinIO)
  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT_HOST:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_net

  # 3. НАШ САЙТ (Next.js)
  web:
    build:
      context: portal_web
      args:
        NEXT_PUBLIC_S3_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
    container_name: portal-web
    restart: always
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    networks:
      - app_net


  # 4. SEEDER (заполняет БД и MinIO)
  seeder:
    build:
      context: portal_web
      target: runner
      args:
        NEXT_PUBLIC_S3_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
    container_name: portal-seeder
    restart: "no" 
    profiles: ["dev"] 
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - S3_ENDPOINT=http://minio:9000
      - CLEAR_DB=${CLEAR_DB:-true}
      - CLEAR_MINIO=${CLEAR_MINIO:-true}
    entrypoint: ["sh", "-c", "npx drizzle-kit push --force && npx tsx src/db/seeder.ts"]
    networks:
      - app_net

volumes:
  postgres_data:
  minio_data:

networks:
  app_net:
    driver: bridge